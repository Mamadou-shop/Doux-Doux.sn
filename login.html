<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Connexion | Doux-Doux</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="auth-page">
        <form class="auth-box" onsubmit="loginUser(event)">
            <h1>Doux-Doux</h1>
            <h2>Connexion</h2>
            <input type="email" id="loginEmail" placeholder="Adresse email" required />
            <input type="password" id="loginPassword" placeholder="Mot de passe" required />
            <button type="submit">Se connecter</button>
            <p>Pas encore de compte ? <a href="register.html">Créer un compte</a></p>
            <p><a href="index.html">Retour à l'accueil</a></p>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
